<svg xmlns="http://www.w3.org/2000/svg" width="960" height="640" viewBox="0 0 960 640" role="img" aria-label="Отжимания на брусьях: техника выполнения">
  <rect width="960" height="640" rx="48" fill="#fff7ec"/>
  <rect x="42" y="42" width="876" height="556" rx="38" fill="#fffaf2" stroke="#eadfce" stroke-width="4"/>
  <text x="72" y="96" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="800" fill="#211b16">Отжимания на брусьях</text>
  <text x="72" y="132" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#8a7b6b">Трицепс · грудь · плечи</text>

  <!-- parallel bars -->
  <rect x="170" y="200" width="420" height="18" rx="9" fill="#5c4a3c"/>
  <rect x="170" y="420" width="420" height="18" rx="9" fill="#5c4a3c"/>
  <!-- bar supports -->
  <rect x="185" y="418" width="14" height="80" rx="5" fill="#5c4a3c"/>
  <rect x="561" y="418" width="14" height="80" rx="5" fill="#5c4a3c"/>

  <!-- body (lowered position) -->
  <circle cx="370" cy="300" r="28" fill="#f0a67d" stroke="#211b16" stroke-width="4"/>
  <rect x="358" y="326" width="24" height="60" rx="8" fill="#e8d5c0" stroke="#211b16" stroke-width="3"/>
  <!-- arms bent (lowered) -->
  <path d="M370 346 L300 210" stroke="#f0a67d" stroke-width="16" stroke-linecap="round"/>
  <path d="M370 346 L440 210" stroke="#f0a67d" stroke-width="16" stroke-linecap="round"/>
  <!-- forearms (lowered) -->
  <path d="M300 210 L250 200 M440 210 L490 200" stroke="#f0a67d" stroke-width="14" stroke-linecap="round"/>
  <!-- legs (lowered) -->
  <path d="M365 386 L340 490 M365 386 L390 490" stroke="#211b16" stroke-width="13" stroke-linecap="round"/>
  <!-- feet -->
  <line x1="330" y1="490" x2="350" y2="490" stroke="#211b16" stroke-width="8" stroke-linecap="round"/>
  <line x1="380" y1="490" x2="400" y2="490" stroke="#211b16" stroke-width="8" stroke-linecap="round"/>

  <!-- ghost body (top position, semi-transparent) -->
  <circle cx="530" cy="240" r="26" fill="#f0a67d" opacity="0.35" stroke="#211b16" stroke-width="3" stroke-dasharray="4 3"/>
  <rect x="518" y="264" width="24" height="50" rx="8" fill="#e8d5c0" opacity="0.35" stroke="#211b16" stroke-width="2" stroke-dasharray="4 3"/>
  <!-- arms straight (top) -->
  <path d="M530 280 L480 208" stroke="#f0a67d" opacity="0.35" stroke-width="14" stroke-linecap="round" stroke-dasharray="4 3"/>
  <path d="M530 280 L580 208" stroke="#f0a67d" opacity="0.35" stroke-width="14" stroke-linecap="round" stroke-dasharray="4 3"/>
  <!-- forearms (top) -->
  <path d="M480 208 L460 200 M580 208 L600 200" stroke="#f0a67d" opacity="0.35" stroke-width="12" stroke-linecap="round" stroke-dasharray="4 3"/>
  <!-- legs (top) -->
  <path d="M525 314 L505 410 M525 314 L545 410" stroke="#211b16" opacity="0.35" stroke-width="11" stroke-linecap="round" stroke-dasharray="4 3"/>
  <line x1="495" y1="410" x2="515" y2="410" stroke="#211b16" opacity="0.35" stroke-width="6" stroke-linecap="round" stroke-dasharray="4 3"/>
  <line x1="535" y1="410" x2="555" y2="410" stroke="#211b16" opacity="0.35" stroke-width="6" stroke-linecap="round" stroke-dasharray="4 3"/>

  <!-- motion arrow -->
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#ff7a3d"/></marker></defs>
  <path d="M450 240 C 450 190, 410 180, 380 180" fill="none" stroke="#ff7a3d" stroke-width="10" stroke-linecap="round" marker-end="url(#arrow)" opacity="0.7"/>
  <text x="470" y="195" text-anchor="middle" font-family="Inter, Arial" font-size="20" font-weight="800" fill="#ff7a3d">вверх</text>
  <path d="M380 310 C 380 360, 420 380, 450 380" fill="none" stroke="#ff7a3d" stroke-width="10" stroke-linecap="round" marker-end="url(#arrow)" opacity="0.7"/>
  <text x="470" y="390" text-anchor="middle" font-family="Inter, Arial" font-size="20" font-weight="800" fill="#ff7a3d">вниз</text>

  <!-- tips -->
  <rect x="620" y="390" width="300" height="42" rx="21" fill="#fff2df" stroke="#ead7a2" stroke-width="2"/>
  <circle cx="642" cy="411" r="7" fill="#ff7a3d"/>
  <text x="660" y="418" font-family="Inter, Arial" font-size="18" font-weight="750" fill="#211b16">локти ближе к корпусу</text>
  <rect x="620" y="444" width="300" height="42" rx="21" fill="#fff2df" stroke="#ead7a2" stroke-width="2"/>
  <circle cx="642" cy="465" r="7" fill="#ff7a3d"/>
  <text x="660" y="472" font-family="Inter, Arial" font-size="18" font-weight="750" fill="#211b16">не раскачивай корпус</text>
  <rect x="620" y="498" width="300" height="42" rx="21" fill="#fff2df" stroke="#ead7a2" stroke-width="2"/>
  <circle cx="642" cy="519" r="7" fill="#ff7a3d"/>
  <text x="660" y="526" font-family="Inter, Arial" font-size="18" font-weight="750" fill="#211b16">угол 90° в локтях</text>
</svg>
