<svg xmlns="http://www.w3.org/2000/svg" width="960" height="640" viewBox="0 0 960 640" role="img" aria-label="Жим гантелей лёжа: техника выполнения">
  <rect width="960" height="640" rx="48" fill="#fff7ec"/>
  <rect x="42" y="42" width="876" height="556" rx="38" fill="#fffaf2" stroke="#eadfce" stroke-width="4"/>
  <text x="72" y="96" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="800" fill="#211b16">Жим гантелей лёжа</text>
  <text x="72" y="132" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#8a7b6b">Грудь · плечи · трицепс</text>
  
  <!-- Скамья -->
  <rect x="210" y="410" width="390" height="32" rx="16" fill="#d8cab7" stroke="#5c4a3c" stroke-width="4"/>
  <rect x="250" y="442" width="26" height="86" rx="8" fill="#5c4a3c"/><rect x="520" y="442" width="26" height="86" rx="8" fill="#5c4a3c"/>
  
  <!-- Голова -->
  <circle cx="330" cy="350" r="28" fill="#f0a67d" stroke="#211b16" stroke-width="4"/>
  
  <!-- Тело -->
  <path d="M360 370 L500 410" stroke="#211b16" stroke-width="18" stroke-linecap="round"/>
  
  <!-- Левая рука (гантель в левой руке — нижняя позиция) -->
  <path d="M370 340 L340 280" stroke="#211b16" stroke-width="13" stroke-linecap="round"/>
  <!-- Левая гантель -->
  <rect x="322" y="262" width="36" height="18" rx="4" fill="#5c4a3c" stroke="#2b2621" stroke-width="3"/>
  <rect x="332" y="256" width="16" height="30" rx="3" fill="#8a7b6b" stroke="#2b2621" stroke-width="2"/>
  <rect x="322" y="278" width="36" height="18" rx="4" fill="#5c4a3c" stroke="#2b2621" stroke-width="3"/>
  
  <!-- Правая рука (гантель в правой руке — верхняя позиция) -->
  <path d="M510 380 L480 300" stroke="#211b16" stroke-width="13" stroke-linecap="round"/>
  <!-- Правая гантель -->
  <rect x="462" y="282" width="36" height="18" rx="4" fill="#5c4a3c" stroke="#2b2621" stroke-width="3"/>
  <rect x="472" y="276" width="16" height="30" rx="3" fill="#8a7b6b" stroke="#2b2621" stroke-width="2"/>
  <rect x="462" y="298" width="36" height="18" rx="4" fill="#5c4a3c" stroke="#2b2621" stroke-width="3"/>
  
  <!-- Ноги -->
  <path d="M410 386 L390 450 M470 403 L520 450" stroke="#211b16" stroke-width="13" stroke-linecap="round"/>
  
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#ff7a3d"/></marker></defs>
  <path d="M436 344 C 436 280, 436 280, 436 240" fill="none" stroke="#ff7a3d" stroke-width="12" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="436" y="250" text-anchor="middle" font-family="Inter, Arial" font-size="20" font-weight="800" fill="#ff7a3d">жми вверх</text>
  
  <rect x="620" y="390" width="300" height="42" rx="21" fill="#fff2df" stroke="#ead7a2" stroke-width="2"/>
  <circle cx="642" cy="411" r="7" fill="#ff7a3d"/>
  <text x="660" y="418" font-family="Inter, Arial" font-size="18" font-weight="750" fill="#211b16">гантели на уровне груди</text>
  <rect x="620" y="444" width="300" height="42" rx="21" fill="#fff2df" stroke="#ead7a2" stroke-width="2"/>
  <circle cx="642" cy="465" r="7" fill="#ff7a3d"/>
  <text x="660" y="472" font-family="Inter, Arial" font-size="18" font-weight="750" fill="#211b16">локти под 45° к корпусу</text>
  <rect x="620" y="498" width="300" height="42" rx="21" fill="#fff2df" stroke="#ead7a2" stroke-width="2"/>
  <circle cx="642" cy="519" r="7" fill="#ff7a3d"/>
  <text x="660" y="526" font-family="Inter, Arial" font-size="18" font-weight="750" fill="#211b16">стопы в пол, лопатки сведены</text>
</svg>
