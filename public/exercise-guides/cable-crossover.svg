<svg xmlns="http://www.w3.org/2000/svg" width="960" height="640" viewBox="0 0 960 640" role="img" aria-label="Кроссовер на блоках: техника выполнения">
  <rect width="960" height="640" rx="48" fill="#fff7ec"/>
  <rect x="42" y="42" width="876" height="556" rx="38" fill="#fffaf2" stroke="#eadfce" stroke-width="4"/>
  <text x="72" y="96" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="800" fill="#211b16">Кроссовер на блоках</text>
  <text x="72" y="132" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#8a7b6b">Грудь · передняя дельта</text>

  <!-- стойки кроссовера -->
  <rect x="160" y="160" width="24" height="320" rx="10" fill="#5c4a3c"/>
  <rect x="616" y="160" width="24" height="320" rx="10" fill="#5c4a3c"/>

  <!-- человек по центру -->
  <circle cx="400" cy="290" r="30" fill="#f0a67d" stroke="#211b16" stroke-width="4"/>
  <path d="M420 320 L500 420" stroke="#211b16" stroke-width="18" stroke-linecap="round"/>
  <path d="M500 420 L420 490 M500 420 L560 490" stroke="#211b16" stroke-width="15" stroke-linecap="round"/>

  <!-- руки в стороны (фаза сведения) -->
  <path d="M390 330 L290 260" stroke="#211b16" stroke-width="13" stroke-linecap="round"/>
  <path d="M440 330 L530 260" stroke="#211b16" stroke-width="13" stroke-linecap="round"/>

  <!-- тросы -->
  <line x1="172" y1="200" x2="290" y2="260" stroke="#ff7a3d" stroke-width="4" stroke-dasharray="8,4"/>
  <line x1="628" y1="200" x2="530" y2="260" stroke="#ff7a3d" stroke-width="4" stroke-dasharray="8,4"/>

  <!-- ручки -->
  <circle cx="290" cy="260" r="8" fill="#5c4a3c"/>
  <circle cx="530" cy="260" r="8" fill="#5c4a3c"/>

  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#ff7a3d"/></marker></defs>
  <path d="M340 295 C 300 295, 260 295, 240 260" fill="none" stroke="#ff7a3d" stroke-width="12" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M460 295 C 500 295, 540 295, 560 260" fill="none" stroke="#ff7a3d" stroke-width="12" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="400" y="370" text-anchor="middle" font-family="Inter, Arial" font-size="20" font-weight="800" fill="#ff7a3d">своди руки</text>

  <rect x="620" y="390" width="300" height="42" rx="21" fill="#fff2df" stroke="#ead7a2" stroke-width="2"/>
  <circle cx="642" cy="411" r="7" fill="#ff7a3d"/>
  <text x="660" y="418" font-family="Inter, Arial" font-size="18" font-weight="750" fill="#211b16">локти чуть согнуты</text>
  <rect x="620" y="444" width="300" height="42" rx="21" fill="#fff2df" stroke="#ead7a2" stroke-width="2"/>
  <circle cx="642" cy="465" r="7" fill="#ff7a3d"/>
  <text x="660" y="472" font-family="Inter, Arial" font-size="18" font-weight="750" fill="#211b16">корпус неподвижен</text>
  <rect x="620" y="498" width="300" height="42" rx="21" fill="#fff2df" stroke="#ead7a2" stroke-width="2"/>
  <circle cx="642" cy="519" r="7" fill="#ff7a3d"/>
  <text x="660" y="526" font-family="Inter, Arial" font-size="18" font-weight="750" fill="#211b16">сокращение в нижней точке</text>
</svg>
