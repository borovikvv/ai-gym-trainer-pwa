<svg xmlns="http://www.w3.org/2000/svg" width="960" height="640" viewBox="0 0 960 640" role="img" aria-label="Махи гантелями в наклоне на заднюю дельту: техника выполнения">
  <rect width="960" height="640" rx="48" fill="#fff7ec"/>
  <rect x="42" y="42" width="876" height="556" rx="38" fill="#fffaf2" stroke="#eadfce" stroke-width="4"/>
  <text x="72" y="96" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="800" fill="#211b16">Махи гантелями в наклоне</text>
  <text x="72" y="132" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#8a7b6b">Задняя дельта · верх спины</text>

  <!-- человек в наклоне -->
  <circle cx="500" cy="210" r="30" fill="#f0a67d" stroke="#211b16" stroke-width="4"/>
  <path d="M480 240 L420 380" stroke="#211b16" stroke-width="18" stroke-linecap="round"/>
  <path d="M420 380 L360 490 M420 380 L480 490" stroke="#211b16" stroke-width="15" stroke-linecap="round"/>

  <!-- руки в стороны-вверх (задняя дельта) -->
  <path d="M440 280 L340 230" stroke="#211b16" stroke-width="13" stroke-linecap="round"/>
  <path d="M470 290 L570 230" stroke="#211b16" stroke-width="13" stroke-linecap="round"/>

  <!-- левая гантель -->
  <rect x="320" y="216" width="26" height="14" rx="3" fill="#5c4a3c" stroke="#2b2621" stroke-width="2"/>
  <rect x="326" y="210" width="14" height="26" rx="2" fill="#8a7b6b" stroke="#2b2621" stroke-width="2"/>
  <rect x="320" y="228" width="26" height="14" rx="3" fill="#5c4a3c" stroke="#2b2621" stroke-width="2"/>

  <!-- правая гантель -->
  <rect x="550" y="216" width="26" height="14" rx="3" fill="#5c4a3c" stroke="#2b2621" stroke-width="2"/>
  <rect x="556" y="210" width="14" height="26" rx="2" fill="#8a7b6b" stroke="#2b2621" stroke-width="2"/>
  <rect x="550" y="228" width="26" height="14" rx="3" fill="#5c4a3c" stroke="#2b2621" stroke-width="2"/>

  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#ff7a3d"/></marker></defs>
  <path d="M400 255 C 370 240, 340 230, 330 220" fill="none" stroke="#ff7a3d" stroke-width="12" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M510 255 C 540 240, 570 230, 580 220" fill="none" stroke="#ff7a3d" stroke-width="12" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="400" y="195" text-anchor="middle" font-family="Inter, Arial" font-size="20" font-weight="800" fill="#ff7a3d">разводи в стороны</text>

  <rect x="620" y="390" width="300" height="42" rx="21" fill="#fff2df" stroke="#ead7a2" stroke-width="2"/>
  <circle cx="642" cy="411" r="7" fill="#ff7a3d"/>
  <text x="660" y="418" font-family="Inter, Arial" font-size="18" font-weight="750" fill="#211b16">наклон корпуса ~45°</text>
  <rect x="620" y="444" width="300" height="42" rx="21" fill="#fff2df" stroke="#ead7a2" stroke-width="2"/>
  <circle cx="642" cy="465" r="7" fill="#ff7a3d"/>
  <text x="660" y="472" font-family="Inter, Arial" font-size="18" font-weight="750" fill="#211b16">лопатки сведены</text>
  <rect x="620" y="498" width="300" height="42" rx="21" fill="#fff2df" stroke="#ead7a2" stroke-width="2"/>
  <circle cx="642" cy="519" r="7" fill="#ff7a3d"/>
  <text x="660" y="526" font-family="Inter, Arial" font-size="18" font-weight="750" fill="#211b16">не поднимай корпус</text>
</svg>
