<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f5f5f7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    <title>AI Gym Trainer</title>
    <script>
      // Apply persisted theme before first paint to avoid FOUC.
      // Default to 'system' (follows OS) unless user explicitly chose light/dark.
      (function () {
        try {
          var stored = localStorage.getItem('ai-gym-trainer:theme');
          if (stored === 'light' || stored === 'dark') {
            document.documentElement.setAttribute('data-theme', stored);
          }
          // For 'system' or null, the CSS @media (prefers-color-scheme: dark)
          // rule will apply automatically — no attribute needed.
        } catch (e) {
          // localStorage may be unavailable (private mode); fall back to system.
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
